<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f3f0" media="(prefers-color-scheme: light)" />
    <title>Migration Linux — Lot-et-Garonne Numérique</title>

    <!-- Applique le thème avant le premier paint pour éviter le flash (FOUC).
         Ordre : choix utilisateur (localStorage) > préférence système > sombre. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
